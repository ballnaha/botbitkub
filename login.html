<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitkub API Hub - Login</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="bg-[#080b11] text-slate-100 font-sans min-h-screen flex items-center justify-center overflow-hidden relative" style="background-image: linear-gradient(rgba(255, 255, 255, 0.006) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.006) 1px, transparent 1px); background-size: 32px 32px;">
    
    <!-- Background Glass Backdrop -->
    <div class="fixed inset-0 backdrop-blur-[100px] z-[-1]"></div>

    <!-- Glowing Background Orbs -->
    <div class="fixed rounded-full filter blur-[120px] z-[-2] opacity-20 w-[600px] h-[600px] bg-blue-500/10 bottom-[-10%] left-[-10%] animate-pulse duration-[8000ms]"></div>

    <!-- Login Card Container -->
    <div class="w-full max-w-[440px] px-6">
        <div class="bg-slate-900/40 border border-white/5 rounded-3xl p-10 backdrop-blur-2xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] transition-all duration-500 hover:border-emerald-500/20">
            
            <!-- Brand Header -->
            <div class="text-center mb-8 flex flex-col items-center">
                <div class="mb-4 text-emerald-400 drop-shadow-[0_0_15px_rgba(16,185,129,0.4)] animate-bounce duration-[4000ms]">
                    <i data-lucide="zap" class="w-12 h-12"></i>
                </div>
                <h1 class="font-display font-extrabold text-3xl tracking-tight bg-gradient-to-r from-white via-slate-200 to-emerald-400 bg-clip-text text-transparent">
                    Bitkub API Hub
                </h1>
                <p class="text-slate-400 text-xs mt-1">กรุณาลงชื่อเข้าใช้งานแดชบอร์ด</p>
            </div>

            <!-- Error Box -->
            <div id="error-box" class="hidden p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-400 text-xs font-semibold mb-6 animate-pulse"></div>

            <!-- Form -->
            <form id="login-form" class="space-y-6">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2">ชื่อผู้ใช้ (Username)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" id="username" placeholder="ระบุ Username" required autocomplete="username"
                            class="w-full bg-slate-950/60 border border-white/5 rounded-xl pl-11 pr-4 py-3.5 text-sm text-white placeholder-slate-600 outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all duration-300">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" id="password" placeholder="ระบุ Password" required autocomplete="current-password"
                            class="w-full bg-slate-950/60 border border-white/5 rounded-xl pl-11 pr-4 py-3.5 text-sm text-white placeholder-slate-600 outline-none focus:border-emerald-400 focus:ring-1 focus:ring-emerald-400/20 transition-all duration-300">
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" 
                    class="w-full py-4 rounded-xl font-display font-extrabold text-sm text-[#060913] bg-gradient-to-r from-emerald-400 via-teal-400 to-emerald-600 hover:shadow-[0_0_30px_rgba(16,185,129,0.35)] hover:brightness-110 active:scale-[0.98] transition-all duration-300 cursor-pointer">
                    ลงชื่อเข้าใช้งาน
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorBox = document.getElementById('error-box');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');

            const username = usernameInput.value;
            const password = passwordInput.value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok && data.status === 'success') {
                    window.location.href = '/';
                } else {
                    errorBox.textContent = data.detail || data.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์';
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
